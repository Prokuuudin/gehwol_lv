<section class="news" id="news">
	<div class="container news__container">
		<div class="news__tabs" role="tablist" aria-label="Jaunumi un informācija">
			<button
				class="news__tab news__tab--active"
				type="button"
				role="tab"
				aria-selected="true"
				aria-controls="news-panel-news"
				id="news-tab-news"
			>Jaunumi</button>
			<button
				class="news__tab"
				type="button"
				role="tab"
				aria-selected="false"
				aria-controls="news-panel-articles"
				id="news-tab-articles"
			>Noderīgi raksti</button>
		</div>

		<div
			class="news__slider swiper swiper-news"
			id="news-panel-news"
			role="tabpanel"
			aria-labelledby="news-tab-news"
		>
			<div class="news__wrapper swiper-wrapper">
				<div class="news__slide swiper-slide">
					<div class="news__image" aria-hidden="true"></div>
					<h3 class="news__slide-title">GEHWOL FUSSKRAFT sērija tagad pieejama Latvijā</h3>
				</div>
				<div class="news__slide swiper-slide">
					<div class="news__image" aria-hidden="true"></div>
					<h3 class="news__slide-title">Atklāts jauns GEHWOL partneru salons Rīgā</h3>
				</div>
				<div class="news__slide swiper-slide">
					<div class="news__image" aria-hidden="true"></div>
					<h3 class="news__slide-title">Pavasara akcija: dāvana pie pirkuma virs 30 €</h3>
				</div>
			</div>
		</div>

		<div
			class="news__slider swiper swiper-articles"
			id="news-panel-articles"
			role="tabpanel"
			aria-labelledby="news-tab-articles"
			hidden
		>
			<div class="news__wrapper swiper-wrapper">
				<div class="news__slide swiper-slide">
					<div class="news__image" aria-hidden="true"></div>
					<h3 class="news__slide-title">Kā izvairīties no sausas ādas uz papēžiem ziemā</h3>
				</div>
				<div class="news__slide swiper-slide">
					<div class="news__image" aria-hidden="true"></div>
					<h3 class="news__slide-title">5 ieradumi veselīgām pēdām ikdienā</h3>
				</div>
				<div class="news__slide swiper-slide">
					<div class="news__image" aria-hidden="true"></div>
					<h3 class="news__slide-title">Kāpēc regulāra pēdu kopšana ir svarīga pēc 40 gadu vecuma</h3>
				</div>
			</div>
		</div>
	</div>
</section>
