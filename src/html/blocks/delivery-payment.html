<section class="delivery-payment" id="delivery-payment">
	<div class="container delivery-payment__container">
		<h2 class="title-2 delivery-payment__title" data-key="delivery-payment-title">Доставка и оплата</h2>

		<div class="delivery-payment__content">
			<div class="delivery-payment__card">
				<div class="delivery-payment__card-head">
					<h3 class="delivery-payment__card-title" data-key="delivery-payment-delivery-title">Доставка</h3>
					<svg class="delivery-payment__card-icon icon icon--truck" aria-hidden="true" focusable="false">
						<use href="./img/svgsprite/sprite.symbol.svg#truck"></use>
					</svg>
				</div>
				<ul class="delivery-payment__list">
					<li class="delivery-payment__item" data-key="delivery-payment-delivery-1">1-2 рабочих дня по Балтии</li>
					<li class="delivery-payment__item" data-key="delivery-payment-delivery-2">Доставка в пакоматы</li>
					<li class="delivery-payment__item" data-key="delivery-payment-delivery-3">Доставка по всей Европе</li>
				</ul>
			</div>

			<div class="delivery-payment__card">
				<div class="delivery-payment__card-head">
					<h3 class="delivery-payment__card-title" data-key="delivery-payment-payment-title">Оплата</h3>
					<svg class="delivery-payment__card-icon icon icon--creditcard" aria-hidden="true" focusable="false">
						<use href="./img/svgsprite/sprite.symbol.svg#creditcard"></use>
					</svg>
				</div>
				<ul class="delivery-payment__list">
					<li class="delivery-payment__item" data-key="delivery-payment-payment-1">Банковский перевод</li>
					<li class="delivery-payment__item" data-key="delivery-payment-payment-2">Visa / Mastercard</li>
					<li class="delivery-payment__item" data-key="delivery-payment-payment-3">Оплата в офисе</li>
				</ul>
			</div>

			<div class="delivery-payment__card">
				<div class="delivery-payment__card-head">
					<h3 class="delivery-payment__card-title" data-key="delivery-payment-business-title">Для бизнеса</h3>
					<svg class="icon icon--partnership">
						<use href="./img/svgsprite/sprite.symbol.svg#partnership"></use>
					</svg>
				</div>
				<ul class="delivery-payment__list">
					<li class="delivery-payment__item" data-key="delivery-payment-business-1">Оптовые поставки</li>
					<li class="delivery-payment__item" data-key="delivery-payment-business-2">Индивидуальные условия</li>
					<li class="delivery-payment__item" data-key="delivery-payment-business-3">Дистрибьюция</li>
				</ul>
			</div>
		</div>

		<div class="delivery-payment__actions">
			<a href="https://thomas-shop.eu" class="btn-link" target="_blank" rel="noopener" data-key="delivery-payment-link">Перейти в интернет-магазин</a>
		</div>
	</div>
</section>
